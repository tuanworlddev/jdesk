# Release: publish dev.jdesk:* to GitHub Packages and create a GitHub Release.
# Triggered by pushing a v* tag (e.g. v0.1.0). Uses the built-in GITHUB_TOKEN, so no
# external credentials are needed. GitHub Packages requires authentication to consume;
# Maven Central (anonymous) publishing needs a Sonatype account + signing key and is a
# follow-up (see docs/development/scaffolding-and-publishing.md).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build and test
        run: ./gradlew build --stacktrace
      - name: Publish to GitHub Packages
        run: |
          ./gradlew publish --stacktrace \
            -PjdeskPublishUrl=https://maven.pkg.github.com/${{ github.repository }} \
            -PjdeskPublishUser=${{ github.actor }} \
            -PjdeskPublishToken=${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "JDesk $TAG" \
            --notes "JDesk $TAG — pre-alpha. Artifacts published to GitHub Packages (dev.jdesk:*). See docs/verification/final-report.md for the verified platform matrix. GitHub Packages requires authentication to consume." \
            --prerelease || gh release edit "$TAG" --prerelease
