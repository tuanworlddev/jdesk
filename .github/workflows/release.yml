# Publishes only after the complete cross-platform CI workflow passes for the exact tag SHA.
name: release

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: read

jobs:
  detect-release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.release.outputs.enabled }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Resolve release tag for the verified SHA
        id: release
        shell: bash
        run: |
          mapfile -t tags < <(git tag --points-at HEAD --list 'v*')
          if [[ ${#tags[@]} -eq 0 ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No v* tag points at this CI SHA; publication is intentionally disabled."
            exit 0
          fi
          if [[ ${#tags[@]} -ne 1 ]]; then
            echo "Expected exactly one v* tag on verified SHA, found ${#tags[@]}" >&2
            exit 1
          fi
          tag="${tags[0]}"
          version="${tag#v}"
          python3 scripts/verify_release_versions.py --tag "$tag"
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  publish:
    needs: detect-release
    if: needs.detect-release.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Validate release source and npm packages
        env:
          RELEASE_TAG: ${{ needs.detect-release.outputs.tag }}
        run: |
          python3 scripts/verify_release_versions.py --tag "$RELEASE_TAG"
          npm ci --prefix js/jdesk-client
          npm test --prefix js/jdesk-client
          npm ci --prefix js/create-jdesk-app
          ./gradlew :modules:jdesk-cli:jar --stacktrace
          npm run bundle --prefix js/create-jdesk-app
          (cd js/jdesk-client && npm pack --dry-run)
          (cd js/create-jdesk-app && npm pack --dry-run)
      - name: Publish libraries + plugin marker to Maven Central Portal
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew publishAggregationToCentralPortal --stacktrace \
            -PcentralPublishingType=AUTOMATIC
      - name: Publish Gradle plugin to the Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :modules:jdesk-gradle-plugin:publishPlugins --stacktrace
      - name: Publish JavaScript packages to npm with OIDC provenance
        run: |
          (cd js/jdesk-client && npm publish)
          (cd js/create-jdesk-app && npm publish)
      - name: Stage release libraries and checksums
        shell: bash
        run: |
          mkdir -p build/release-artifacts
          find modules -path '*/build/libs/*.jar' -type f \
            ! -name '*-SNAPSHOT*' -exec cp {} build/release-artifacts/ \;
          test -n "$(find build/release-artifacts -name '*.jar' -print -quit)"
          (cd build/release-artifacts && sha256sum *.jar > checksums.sha256)
      - name: Attest release provenance
        if: vars.JDESK_ENABLE_ATTESTATIONS == 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: build/release-artifacts/*
      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.detect-release.outputs.tag }}
        run: |
          gh release create "$TAG" --target "${{ github.event.workflow_run.head_sha }}" \
            --title "JDesk $TAG" \
            --generate-notes \
            --notes "Pre-alpha artifacts verified by the complete Windows, macOS, and Linux native/security/package CI matrix." \
            --prerelease || gh release edit "$TAG" --prerelease
          gh release upload "$TAG" build/release-artifacts/* --clobber
