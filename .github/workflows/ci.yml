# JDesk CI (spec section 19).
# Phase 0 skeleton: real unit/build jobs only. Native and package jobs are added by
# their phases; they are intentionally ABSENT (not fake-green) until implemented.
# Skipped/absent native jobs mean the release status is INCOMPLETE by definition.
name: ci

on:
  workflow_dispatch:
  push:
    branches: [main, 'dev/**']
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  core-unit-jdk25:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      # CUPS client provides `lp` so CupsPrintingTest exercises the real spooler path
      # (a job to a bogus printer exits non-zero) rather than the lp-absent branch,
      # matching the coverage the macOS dev machines produce.
      - name: Install CUPS client (lp)
        run: sudo apt-get update && sudo apt-get install -y cups-client
      - name: Build and unit test
        run: ./gradlew build --stacktrace
      - name: Generate and build real CLI templates
        shell: bash
        run: |
          ./gradlew :modules:jdesk-cli:installDist
          tmp="$(mktemp -d)"
          cli="modules/jdesk-cli/build/install/jdesk/bin/jdesk"
          "$cli" create "$tmp/basic" --package com.example.basic --jdesk-source "$GITHUB_WORKSPACE"
          "$cli" create "$tmp/structured" --template structured --package com.example.structured --jdesk-source "$GITHUB_WORKSPACE"
          "$tmp/basic/gradlew" -p "$tmp/basic" classes --no-configuration-cache
          "$tmp/structured/gradlew" -p "$tmp/structured" classes --no-configuration-cache
      - name: TypeScript client build and tests
        run: npm ci --prefix js/jdesk-client && npm test --prefix js/jdesk-client
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: core-unit-jdk25-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  gradle-plugin-functional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Gradle plugin functional tests (TestKit)
        run: ./gradlew :modules:jdesk-gradle-plugin:test --stacktrace
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-plugin-functional-reports
          path: modules/jdesk-gradle-plugin/build/reports/**
          if-no-files-found: ignore

  windows-x64-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: "Fetch WebView2 loader (SDK 1.0.2903.40; Microsoft.Web.WebView2 license documented in docs)"
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2903.40" -OutFile wv2.zip
          Expand-Archive wv2.zip -DestinationPath wv2sdk
          $loader = (Resolve-Path "wv2sdk/build/native/x64/WebView2Loader.dll").Path
          echo "WEBVIEW2_LOADER=$loader" >> $env:GITHUB_ENV
      - name: WebView2 runtime version present on runner
        shell: pwsh
        run: |
          $paths = @(
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}",
            "HKLM:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) { Get-ItemProperty $p | Select-Object pv; $found = $true }
          }
          if (-not $found) { Write-Host "WebView2 runtime not found; installing Evergreen bootstrapper"
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile wv2setup.exe
            Start-Process -FilePath wv2setup.exe -ArgumentList "/silent","/install" -Wait }
      - name: Run native smoke (real WebView2)
        shell: pwsh
        run: ./gradlew --no-configuration-cache :test-apps:native-smoke:run "-PjdeskPlatform=windows" "-PjdeskWebView2Loader=$env:WEBVIEW2_LOADER" "-PjdeskStress=true" --stacktrace
      - name: Verify evidence (anti-fake)
        shell: pwsh
        run: ./gradlew --no-configuration-cache :test-apps:native-smoke:verifyEvidence "-PjdeskPlatform=windows"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-x64-native-evidence
          path: test-apps/native-smoke/build/evidence/**
          if-no-files-found: warn

  linux-x64-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      # Exact packages: libwebkit2gtk-4.1-0 (WebKitGTK 4.1 engine; pulls GTK 3, GLib,
      # libsoup3, JavaScriptCore and cairo as dependencies), xvfb (headless X server),
      # plus gnome-keyring + libsecret-tools + dbus-x11 so the SecretStore probe can
      # exercise a real freedesktop Secret Service (secret-tool) headlessly.
      - name: Install WebKitGTK 4.1, Xvfb, and Secret Service
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 xvfb gnome-keyring libsecret-tools dbus-x11
          apt-cache policy libwebkit2gtk-4.1-0 xvfb gnome-keyring libsecret-tools
      - name: Run native smoke (real WebKitGTK under Xvfb)
        env:
          # GitHub-hosted runners have no DRM render node; WebKit's DMA-BUF renderer
          # fails/blanks under llvmpipe. Documented WebKitGTK environment switch.
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" bash -ceu '
            export $(dbus-launch)
            eval "$(echo -n "ci-keyring" | gnome-keyring-daemon --unlock --replace --components=secrets)"
            export GNOME_KEYRING_CONTROL
            secret-tool store --label=ci-probe service jdesk-ci key probe <<< "ok" && secret-tool lookup service jdesk-ci key probe
            ./gradlew --no-configuration-cache :test-apps:native-smoke:run "-PjdeskPlatform=linux" "-PjdeskStress=true" --stacktrace'
      - name: Verify evidence (anti-fake)
        run: ./gradlew --no-configuration-cache :test-apps:native-smoke:verifyEvidence "-PjdeskPlatform=linux"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-x64-native-evidence
          path: test-apps/native-smoke/build/evidence/**
          if-no-files-found: warn

  security-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: "Fetch WebView2 loader (SDK 1.0.2903.40; Microsoft.Web.WebView2 license documented in docs)"
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2903.40" -OutFile wv2.zip
          Expand-Archive wv2.zip -DestinationPath wv2sdk
          $loader = (Resolve-Path "wv2sdk/build/native/x64/WebView2Loader.dll").Path
          echo "WEBVIEW2_LOADER=$loader" >> $env:GITHUB_ENV
      - name: WebView2 runtime version present on runner
        shell: pwsh
        run: |
          $paths = @(
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}",
            "HKLM:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) { Get-ItemProperty $p | Select-Object pv; $found = $true }
          }
          if (-not $found) { Write-Host "WebView2 runtime not found; installing Evergreen bootstrapper"
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile wv2setup.exe
            Start-Process -FilePath wv2setup.exe -ArgumentList "/silent","/install" -Wait }
      - name: Run security probes (real WebView2)
        shell: pwsh
        run: ./gradlew --no-configuration-cache :test-apps:security-probe:run "-PjdeskPlatform=windows" "-PjdeskWebView2Loader=$env:WEBVIEW2_LOADER" --stacktrace
      - name: Verify evidence (anti-fake)
        shell: pwsh
        run: ./gradlew --no-configuration-cache :test-apps:security-probe:verifyEvidence "-PjdeskPlatform=windows"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-windows-x64-evidence
          path: test-apps/security-probe/build/evidence/**
          if-no-files-found: warn

  security-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      # Exact packages: libwebkit2gtk-4.1-0 (WebKitGTK 4.1 engine; pulls GTK 3, GLib,
      # libsoup3, JavaScriptCore and cairo as dependencies) and xvfb (headless X server).
      - name: Install WebKitGTK 4.1 and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 xvfb
          apt-cache policy libwebkit2gtk-4.1-0 xvfb
      - name: Run security probes (real WebKitGTK under Xvfb)
        env:
          # GitHub-hosted runners have no DRM render node; WebKit's DMA-BUF renderer
          # fails/blanks under llvmpipe. Documented WebKitGTK environment switch.
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" ./gradlew --no-configuration-cache :test-apps:security-probe:run "-PjdeskPlatform=linux" --stacktrace
      - name: Verify evidence (anti-fake)
        run: ./gradlew --no-configuration-cache :test-apps:security-probe:verifyEvidence "-PjdeskPlatform=linux"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-linux-x64-evidence
          path: test-apps/security-probe/build/evidence/**
          if-no-files-found: warn

  package-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Install WebKitGTK and Xvfb
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-0 xvfb
      - name: Build install distribution
        run: ./gradlew :test-apps:native-smoke:installDist "-PjdeskPlatform=linux" --stacktrace
      - name: Build app image with jpackage (real target-OS packaging)
        run: |
          jpackage --type app-image --name JDeskSmoke \
            --module-path test-apps/native-smoke/build/install/native-smoke/lib \
            --module dev.jdesk.testapps.nativesmoke/dev.jdesk.testapps.nativesmoke.Main \
            --add-modules dev.jdesk.platform.linux \
            --java-options "--enable-native-access=dev.jdesk.platform.linux" \
            --java-options "--illegal-native-access=deny" \
            --java-options "-Djdesk.evidence.dir=$GITHUB_WORKSPACE/package-evidence" \
            --java-options "-Djdesk.evidence.category=package" \
            --java-options "-Djdesk.smoke.fullProbes=false" \
            --dest build/jpackage
      - name: Launch packaged app (no Gradle) under Xvfb
        env:
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" ./build/jpackage/JDeskSmoke/bin/JDeskSmoke
      - name: Create DEB installer (jpackage, real target-OS packaging; UNSIGNED)
        run: |
          sudo apt-get install -y fakeroot binutils
          jpackage --type deb --name jdesksmoke \
            --app-image build/jpackage/JDeskSmoke \
            --app-version 1.0.0 --dest build/installer
          ls -la build/installer
          sha256sum build/installer/*.deb | tee -a package-evidence/installer.sha256
      - name: Record package checksum
        run: sha256sum build/jpackage/JDeskSmoke/bin/JDeskSmoke | tee package-evidence/launcher.sha256
      - name: Verify evidence (anti-fake)
        run: ./gradlew :test-apps:native-smoke:verifyEvidence "-PjdeskPlatform=linux" "-PjdeskEvidenceVerifyDir=$GITHUB_WORKSPACE/package-evidence"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-linux-x64-evidence
          path: package-evidence/**
          if-no-files-found: warn

  package-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: "Fetch WebView2 loader (SDK 1.0.2903.40)"
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2903.40" -OutFile wv2.zip
          Expand-Archive wv2.zip -DestinationPath wv2sdk
          $loader = (Resolve-Path "wv2sdk/build/native/x64/WebView2Loader.dll").Path
          echo "WEBVIEW2_LOADER=$loader" >> $env:GITHUB_ENV
      - name: Build install distribution
        shell: pwsh
        run: ./gradlew :test-apps:native-smoke:installDist "-PjdeskPlatform=windows" --stacktrace
      - name: Build app image with jpackage (real target-OS packaging)
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE -replace '\\','/'
          jpackage --type app-image --name JDeskSmoke `
            --module-path test-apps/native-smoke/build/install/native-smoke/lib `
            --module dev.jdesk.testapps.nativesmoke/dev.jdesk.testapps.nativesmoke.Main `
            --add-modules dev.jdesk.platform.windows `
            --java-options "--enable-native-access=dev.jdesk.platform.windows" `
            --java-options "--illegal-native-access=deny" `
            --java-options "-Djdesk.windows.webview2loader=$($env:WEBVIEW2_LOADER -replace '\\','/')" `
            --java-options "-Djdesk.evidence.dir=$ws/package-evidence" `
            --java-options "-Djdesk.evidence.category=package" `
            --java-options "-Djdesk.smoke.fullProbes=false" `
            --dest build/jpackage
      - name: Launch packaged app (no Gradle)
        shell: pwsh
        run: |
          & .\build\jpackage\JDeskSmoke\JDeskSmoke.exe | Out-Host
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Create MSI installer (jpackage, real target-OS packaging; UNSIGNED)
        shell: pwsh
        run: |
          jpackage --type msi --name JDeskSmoke `
            --app-image build/jpackage/JDeskSmoke `
            --app-version 1.0.0 --dest build/installer
          Get-ChildItem build/installer
          Get-FileHash build/installer/*.msi -Algorithm SHA256 | Format-List | Out-File -Append package-evidence/installer.sha256
      - name: Record package checksum
        shell: pwsh
        run: Get-FileHash build\jpackage\JDeskSmoke\JDeskSmoke.exe -Algorithm SHA256 | Format-List | Out-File -Append package-evidence/launcher.sha256
      - name: Verify evidence (anti-fake)
        shell: pwsh
        run: ./gradlew :test-apps:native-smoke:verifyEvidence "-PjdeskPlatform=windows" "-PjdeskEvidenceVerifyDir=$env:GITHUB_WORKSPACE/package-evidence"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-windows-x64-evidence
          path: package-evidence/**
          if-no-files-found: warn

  macos-arm64-native:
    runs-on: macos-14-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Run native smoke (real WKWebView)
        run: ./gradlew --no-configuration-cache :test-apps:native-smoke:run "-PjdeskPlatform=macos" "-PjdeskStress=true" --stacktrace
      - name: Verify evidence (anti-fake)
        run: ./gradlew --no-configuration-cache :test-apps:native-smoke:verifyEvidence "-PjdeskPlatform=macos"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-arm64-native-evidence
          path: test-apps/native-smoke/build/evidence/**
          if-no-files-found: warn

  security-macos-arm64:
    runs-on: macos-14-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Run security probes (real WKWebView)
        run: ./gradlew --no-configuration-cache :test-apps:security-probe:run "-PjdeskPlatform=macos" --stacktrace
      - name: Verify evidence (anti-fake)
        run: ./gradlew --no-configuration-cache :test-apps:security-probe:verifyEvidence "-PjdeskPlatform=macos"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-macos-arm64-evidence
          path: test-apps/security-probe/build/evidence/**
          if-no-files-found: warn

  package-macos-arm64:
    runs-on: macos-14-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build install distribution
        run: ./gradlew :test-apps:native-smoke:installDist "-PjdeskPlatform=macos" --stacktrace
      - name: Build app image with jpackage
        run: |
          jpackage --type app-image --name JDeskSmoke \
            --module-path test-apps/native-smoke/build/install/native-smoke/lib \
            --module dev.jdesk.testapps.nativesmoke/dev.jdesk.testapps.nativesmoke.Main \
            --add-modules dev.jdesk.platform.macos \
            --java-options "--enable-native-access=dev.jdesk.platform.macos" \
            --java-options "--illegal-native-access=deny" \
            --java-options "-XstartOnFirstThread" \
            --java-options "-Djdesk.evidence.dir=$GITHUB_WORKSPACE/package-evidence" \
            --java-options "-Djdesk.evidence.category=package" \
            --java-options "-Djdesk.smoke.fullProbes=false" \
            --dest build/jpackage
      - name: Launch packaged app without Gradle
        run: ./build/jpackage/JDeskSmoke.app/Contents/MacOS/JDeskSmoke
      - name: Create unsigned DMG installer
        run: |
          jpackage --type dmg --name JDeskSmoke --app-image build/jpackage/JDeskSmoke.app \
            --app-version 1.0.0 --dest build/installer
          shasum -a 256 build/installer/*.dmg | tee -a package-evidence/installer.sha256
          shasum -a 256 build/jpackage/JDeskSmoke.app/Contents/MacOS/JDeskSmoke \
            | tee package-evidence/launcher.sha256
      - name: Verify evidence (anti-fake)
        run: ./gradlew :test-apps:native-smoke:verifyEvidence "-PjdeskPlatform=macos" "-PjdeskEvidenceVerifyDir=$GITHUB_WORKSPACE/package-evidence"
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-macos-arm64-evidence
          path: package-evidence/**
          if-no-files-found: warn

  release-gate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - core-unit-jdk25
      - gradle-plugin-functional
      - windows-x64-native
      - linux-x64-native
      - macos-arm64-native
      - security-windows-x64
      - security-linux-x64
      - security-macos-arm64
      - package-windows-x64
      - package-linux-x64
      - package-macos-arm64
    steps:
      - name: Require every verification job to pass
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: echo "$NEEDS_JSON" | jq -e 'all(.[]; .result == "success")'
