# JDesk CI (spec section 19).
# Phase 0 skeleton: real unit/build jobs only. Native and package jobs are added by
# their phases; they are intentionally ABSENT (not fake-green) until implemented.
# Skipped/absent native jobs mean the release status is INCOMPLETE by definition.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core-unit-jdk25:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build and unit test
        run: ./gradlew build --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: core-unit-jdk25-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  gradle-plugin-functional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Gradle plugin functional tests (TestKit)
        run: ./gradlew :modules:jdesk-gradle-plugin:test --stacktrace
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-plugin-functional-reports
          path: modules/jdesk-gradle-plugin/build/reports/**
          if-no-files-found: ignore

  # Added in Phase 2: windows-x64-native, package-windows-x64
  # Added in Phase 4: macos-arm64-native, package-macos-arm64
  # Added in Phase 5: linux-x64-native (Xvfb), package-linux-x64
  # Added in Phase 6: security probes
  # Added in Phase 7: evidence verification and consolidated status
